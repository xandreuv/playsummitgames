<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Selecciona idioma — Playsummit Games</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script defer src="/js/lang-redirect.js"></script>
</head>
<body>
  <main class="center">
    <h1>Selecciona idioma / Seleccioneu l'idioma</h1>
    <p>La web está disponible en español y catalán. Selecciona tu idioma o espera a que detectemos la configuración del navegador.</p>
    <nav aria-label="Seleccionar idioma">
      <ul class="lang-list">
        <li><a href="/es/" hreflang="es">Español</a></li>
        <li><a href="/cat/" hreflang="ca">Català</a></li>
      </ul>
    </nav>
    <p class="note">Si tu navegador está configurado en español o catalán te redirigiremos automáticamente.</p>
  </main>
</body>
</html>
